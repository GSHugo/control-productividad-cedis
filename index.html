    <div id="pantalla-login" class="space-y-4">
      <label class="block text-sm font-semibold text-slate-700">Identificación de Colaborador:</label>
      <select id="select-usuario" onchange="mostrarPreviewUsuario()" class="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-2xl focus:outline-none font-medium text-slate-700" style="border-color:#e2e8f0;">
        <option value="">Conectando con Servidor...</option>
      </select>

      <div id="preview-usuario" class="hidden bg-slate-50 border border-slate-100 rounded-2xl p-4 flex items-center gap-4">
        <img id="img-preview" class="w-14 h-14 rounded-full object-cover border-2" style="border-color: var(--ifull-blue);" src="" alt="">
        <div id="avatar-preview" class="hidden w-14 h-14 rounded-full flex items-center justify-center text-white font-bold text-lg" style="background: var(--ifull-blue);"></div>
        <div>
          <p id="nombre-preview" class="font-bold text-slate-800">-</p>
          <p id="rol-preview" class="text-xs text-slate-500 font-medium">-</p>
        </div>
      </div>

      <button onclick="ingresarAApp()" class="w-full text-white font-bold py-4 rounded-2xl transition shadow-lg" style="background: var(--ifull-blue); box-shadow: 0 10px 15px -3px rgba(47,148,245,0.3);" onmouseover="this.style.background='var(--ifull-blue-dark)'" onmouseout="this.style.background='var(--ifull-blue)'">
        Ingresar al Panel
      </button>
    </div>

    <div id="pantalla-operacion" class="hidden space-y-6">
      <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 flex justify-between items-center">
        <div class="flex items-center gap-3">
          <img id="img-usuario-activo" class="hidden w-12 h-12 rounded-full object-cover border-2" style="border-color: var(--ifull-blue);" src="" alt="">
          <div id="avatar-usuario-activo" class="hidden w-12 h-12 rounded-full flex items-center justify-center text-white font-bold" style="background: var(--ifull-blue);"></div>
          <div>
            <h2 id="lbl-usuario" class="font-bold text-slate-800">-</h2>
            <p id="lbl-rol" class="text-xs text-slate-500 font-medium">-</p>
          </div>
        </div>
        <button onclick="regresarAlLogin()" class="text-xs font-semibold text-red-500 bg-red-50 px-3 py-2 rounded-xl">Salir</button>
      </div>

      <div id="box-seleccion-tarea" class="space-y-4">
        <h3 class="text-sm font-semibold text-slate-700">¿Qué actividad vas a iniciar?</h3>
        <div id="contenedor-botones" class="grid grid-cols-1 gap-3"></div>
      </div>

      <div id="box-cronometro" class="hidden bg-emerald-50 border border-emerald-200 rounded-3xl p-6 text-center space-y-4">
        <span id="badge-reanudado" class="hidden inline-block text-white text-xs font-bold px-3 py-1 rounded-full uppercase" style="background: var(--ifull-orange);">Reanudado</span>
        <span id="badge-progreso" class="inline-block bg-emerald-500 text-white text-xs font-bold px-3 py-1 rounded-full animate-pulse uppercase">En Progreso</span>
        <h3 id="lbl-tarea-activa" class="font-bold text-lg text-emerald-900">-</h3>
        <p class="text-xs text-emerald-700">Iniciado a las: <span id="lbl-hora-inicio" class="font-bold">00:00:00</span></p>
        <p class="text-xs text-emerald-700">Tiempo transcurrido: <span id="lbl-tiempo-transcurrido" class="font-bold">00:00:00</span></p>
        <button onclick="abrirCierreActividad()" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-4 rounded-2xl transition shadow-lg shadow-red-200">
          ■ Finalizar Actividad
        </button>
      </div>
    </div>

    <div id="pantalla-cierre" class="hidden space-y-5">
      <div class="text-center">
        <h3 class="font-bold text-slate-800 text-lg">Cierre de Registro</h3>
        <p id="lbl-resumen-tarea" class="text-sm text-slate-500">-</p>
      </div>
      <div class="space-y-2">
        <label class="block text-sm font-semibold text-slate-700">Cantidad Contada / Inventariada:</label>
        <input type="number" id="txt-cantidad" inputmode="numeric" placeholder="Ej. 450" class="w-full text-center text-3xl font-bold p-4 bg-slate-50 border-2 border-slate-200 rounded-2xl focus:border-emerald-500 focus:outline-none">
      </div>
      <div class="space-y-2">
        <label class="block text-sm font-semibold text-slate-700">Comentarios / Folio Odoo:</label>

      </div>
      <button onclick="confirmarCierreActividad()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-2xl transition shadow-lg shadow-emerald-200">

      </button>
    </div>

  </div>

    <div id="banner-card" class="rounded-2xl shadow-xl p-4 text-sm font-semibold text-white flex justify-between items-start gap-3">
      <span id="banner-msg" class="leading-snug">-</span>
      <button onclick="ocultarBanner()" class="font-bold opacity-80 hover:opacity-100">✕</button>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    let CONFIG = {};
    let usuarioActivo = "";
    let tareaActiva = "";
    let timerInterval = null;
    let horaInicioTimestamp = null;
    let bannerTimeout = null;

    window.addEventListener('DOMContentLoaded', () => {
      mostrarLoading("Cargando lista de operadores...");
      fetch(CONFIG_APP.URL_API_GOOGLE)
        .then(res => res.json())
        .then(data => {
          CONFIG = data;
          inicializarSelector();
          ocultarLoading();
        })
        .catch(err => {
          ocultarLoading();
          mostrarBanner("No se pudo cargar la lista de operadores. Revisa tu conexión y recarga la página.", "error");
          console.error(err);
        });
    });

    function mostrarLoading(msg) {
      document.getElementById('overlay-msg').innerText = msg;
      document.getElementById('overlay').classList.remove('hidden');
    }
    function ocultarLoading() { document.getElementById('overlay').classList.add('hidden'); }

    // Reemplaza alert(): notificación propia, no bloqueante, con color según tipo.
    function mostrarBanner(msg, tipo = "info") {
      const card = document.getElementById('banner-card');
      card.className = "rounded-2xl shadow-xl p-4 text-sm font-semibold text-white flex justify-between items-start gap-3 " +
        (tipo === "error" ? "bg-red-500" : tipo === "exito" ? "bg-emerald-600" : "");
      if (tipo !== "error" && tipo !== "exito") card.style.background = "var(--ifull-orange)";
      else card.style.background = "";
      document.getElementById('banner-msg').innerText = msg;
      document.getElementById('banner').classList.remove('hidden');
      clearTimeout(bannerTimeout);
      bannerTimeout = setTimeout(ocultarBanner, 5000);
    }
    function ocultarBanner() { document.getElementById('banner').classList.add('hidden'); }

    function inicializarSelector() {
      const s = document.getElementById('select-usuario');
      s.innerHTML = '<option value="">-- Elige tu Nombre --</option>';
      CONFIG.usuarios.forEach(u => {
        let o = document.createElement('option'); o.value = u; o.textContent = u; s.appendChild(o);
      });
    }

    function obtenerIniciales(nombre) {
      return nombre.split(' ').filter(Boolean).slice(0, 2).map(p => p[0].toUpperCase()).join('');
    }

    // Pinta foto + rol en cualquier par de elementos (img + avatar de iniciales como respaldo).
    function pintarFotoYRol(nombre, datos, imgEl, avatarEl) {
      if (datos && datos.foto) {
        imgEl.src = datos.foto;
        imgEl.classList.remove('hidden');
        avatarEl.classList.add('hidden');
      } else {
        avatarEl.textContent = obtenerIniciales(nombre);
        avatarEl.classList.remove('hidden');
        imgEl.classList.add('hidden');
      }
    }

    function mostrarPreviewUsuario() {
      const u = document.getElementById('select-usuario').value;
      const preview = document.getElementById('preview-usuario');
      if (!u) { preview.classList.add('hidden'); return; }

      const d = CONFIG.actividadesPorRol[u] || { rol: "Operador" };
      document.getElementById('nombre-preview').innerText = u;
      document.getElementById('rol-preview').innerText = d.rol || "Operador";
      pintarFotoYRol(u, d, document.getElementById('img-preview'), document.getElementById('avatar-preview'));
      preview.classList.remove('hidden');
    }

    function ingresarAApp() {
      const u = document.getElementById('select-usuario').value;
      if (!u) return mostrarBanner("Selecciona un operador.", "error");
      usuarioActivo = u;

      mostrarLoading("Verificando si tienes tareas pendientes...");

      fetch(CONFIG_APP.URL_API_GOOGLE, {
        method: 'POST',
        body: JSON.stringify({ accion: 'VERIFICAR', usuario: u })
      })
      .then(res => res.json())
      .then(estado => {
        ocultarLoading();

        const d = CONFIG.actividadesPorRol[u] || { rol: "Operador", tareas: [] };
        document.getElementById('lbl-usuario').innerText = u;
        document.getElementById('lbl-rol').innerText = d.rol || "Operador";
        pintarFotoYRol(u, d, document.getElementById('img-usuario-activo'), document.getElementById('avatar-usuario-activo'));

        if (estado.tienePendiente) {
          mostrarCronometro(estado.actividad, estado.horaInicio, { reanudado: false });
          cambiarPantalla('pantalla-operacion');
        } else {
          const c = document.getElementById('contenedor-botones'); c.innerHTML = "";
          d.tareas.forEach(t => {
            let b = document.createElement('button');
            b.className = "w-full text-left p-4 bg-slate-50 hover:bg-blue-50 border border-slate-200 rounded-2xl font-semibold text-slate-700 flex justify-between items-center text-sm";
            b.innerHTML = `<span>${t}</span> <span style="color: var(--ifull-blue);">▶</span>`;
            b.onclick = () => ejecutarPlay(t);
            c.appendChild(b);
          });
          document.getElementById('box-cronometro').classList.add('hidden');
          document.getElementById('box-seleccion-tarea').classList.remove('hidden');
          cambiarPantalla('pantalla-operacion');
        }
      })
      .catch(err => {
        ocultarLoading();
        mostrarBanner("Error verificando estado. Intenta de nuevo.", "error");
        console.error(err);
      });
    }

    function ejecutarPlay(t) {
      tareaActiva = t;
      mostrarLoading("Sincronizando marca de Inicio...");
      fetch(CONFIG_APP.URL_API_GOOGLE, {
        method: 'POST',
        body: JSON.stringify({ accion: 'PLAY', usuario: usuarioActivo, actividad: t })
      })
      .then(res => res.json())
      .then(res => {
        ocultarLoading();
        if (res.status === 'ok') {
          mostrarCronometro(t, res.horaInicio, { reanudado: false });
        } else if (res.status === 'alerta') {
          // Ya existía una actividad abierta para este usuario (detectada hasta ahora por el
          // servidor en la acción PLAY, no en VERIFICAR — revisar esa inconsistencia en el backend).
          // En vez de alert() + relanzar todo el login, reanudamos directo con los datos que
          // el propio servidor ya nos da, si vienen incluidos en la respuesta.
          if (res.actividad && res.horaInicio) {
            mostrarBanner("Ya tenías esta actividad abierta. La reanudamos.", "alerta");
            mostrarCronometro(res.actividad, res.horaInicio, { reanudado: true });
          } else {
            // El backend no incluyó los datos de la tarea pendiente en la respuesta de "alerta":
            // como respaldo, sí hace falta volver a consultar VERIFICAR.
            mostrarBanner(res.message || "Ya tienes una actividad en progreso.", "alerta");
            ingresarAApp();
          }
        } else {
          mostrarBanner(res.message || "No se pudo iniciar la actividad.", "error");
        }
      })
      .catch(err => {
        ocultarLoading();
        mostrarBanner("Error de conexión al iniciar la actividad. Intenta de nuevo.", "error");
        console.error(err);
      });
    }

    function mostrarCronometro(actividad, horaInicio, { reanudado }) {
      document.getElementById('lbl-tarea-activa').innerText = actividad;
      document.getElementById('lbl-hora-inicio').innerText = horaInicio;
      document.getElementById('badge-reanudado').classList.toggle('hidden', !reanudado);

      document.getElementById('box-seleccion-tarea').classList.add('hidden');
      document.getElementById('box-cronometro').classList.remove('hidden');

      iniciarTimer(horaInicio);
    }

    // Cronómetro en vivo: útil para ver de un vistazo cuánto lleva corriendo una tarea reanudada.
    function iniciarTimer(horaInicioStr) {
      clearInterval(timerInterval);
      const hoy = new Date();
      const [hh, mm, ss] = horaInicioStr.split(':').map(Number);
      horaInicioTimestamp = new Date(hoy.getFullYear(), hoy.getMonth(), hoy.getDate(), hh, mm, ss || 0).getTime();

      const actualizar = () => {
        let diff = Math.floor((Date.now() - horaInicioTimestamp) / 1000);
        if (diff < 0) diff = 0;
        const h = String(Math.floor(diff / 3600)).padStart(2, '0');
        const m = String(Math.floor((diff % 3600) / 60)).padStart(2, '0');
        const s = String(diff % 60).padStart(2, '0');
        document.getElementById('lbl-tiempo-transcurrido').innerText = `${h}:${m}:${s}`;
      };
      actualizar();
      timerInterval = setInterval(actualizar, 1000);
    }

    function abrirCierreActividad() {
      clearInterval(timerInterval);
      document.getElementById('lbl-resumen-tarea').innerText = "Terminaste: " + tareaActiva;
      cambiarPantalla('pantalla-cierre');
    }

    function confirmarCierreActividad() {
      const cant = document.getElementById('txt-cantidad').value;
      const comm = document.getElementById('txt-comentarios').value;
      if (!cant || cant <= 0) return mostrarBanner("Coloca una cantidad válida.", "error");

      mostrarLoading("Inyectando registros en MasterData...");
      fetch(CONFIG_APP.URL_API_GOOGLE, {
        method: 'POST',
        body: JSON.stringify({ accion: 'STOP', usuario: usuarioActivo, cantidad: cant, comentarios: comm })
      })
      .then(res => res.json())
      .then(res => {
        ocultarLoading();
        if (res.status === 'ok') {
          mostrarBanner(`¡Guardado con éxito! Tiempo registrado: ${res.tiempo}`, "exito");
          document.getElementById('box-cronometro').classList.add('hidden');
          document.getElementById('box-seleccion-tarea').classList.remove('hidden');
          cambiarPantalla('pantalla-operacion');
        } else {
          mostrarBanner(res.message || "No se pudo guardar el registro.", "error");
        }
      })
      .catch(err => {
        ocultarLoading();
        mostrarBanner("Error de conexión al guardar. Tu actividad sigue abierta, intenta cerrarla de nuevo.", "error");
        console.error(err);
      });
    }

    function cambiarPantalla(p) {
      document.getElementById('pantalla-login').classList.add('hidden');
      document.getElementById('pantalla-operacion').classList.add('hidden');
      document.getElementById('pantalla-cierre').classList.add('hidden');
      document.getElementById(p).classList.remove('hidden');
    }
    function regresarAlLogin() {
      clearInterval(timerInterval);
      cambiarPantalla('pantalla-login');
    }
  </script>
</body>
</html>
